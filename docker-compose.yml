services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ragent-network

  ragent-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ragent
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE: ${OPENAI_API_BASE}
      CHAT_MODEL: ${CHAT_MODEL}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      DEBUG: ${DEBUG:-false}
      APP_NAME: "Ragent Python API"
      STORAGE_TYPE: local
      STORAGE_BASE_DIR: /app/uploads
      ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost:8000","http://frontend:80"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - ragent-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - ragent-api
    networks:
      - ragent-network
    restart: unless-stopped
    profiles:
      - full

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ragent-network
    profiles:
      - optional

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ragent-network:
    driver: bridge
